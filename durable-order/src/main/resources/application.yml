server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:file:./build/durable-order-data;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

flower:
  enabled: true
  auto-start: true
  persistence:
    type: jdbc
    jdbc:
      dialect: h2
  workers:
    - name: orders
      interval-ms: 250

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
